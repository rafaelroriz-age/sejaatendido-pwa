name: Deploy Homologação

on:
  push:
    branches: [homolog]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-homolog:
    name: build-and-deploy-homolog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (staging)
        run: npm run build
        env:
          # URL do backend de STAGING — adicione o secret VITE_API_URL_STAGING no repo original
          VITE_API_URL: ${{ secrets.VITE_API_URL_STAGING || 'https://sejaatendido-staging-backend.onrender.com' }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          # Use a chave TESTE do Mercado Pago em homologação, nunca a de produção
          VITE_MP_PUBLIC_KEY: ${{ secrets.VITE_MP_PUBLIC_KEY_STAGING || secrets.VITE_MP_PUBLIC_KEY }}

      - name: Preparar dist (CNAME + 404 fallback)
        run: |
          # CNAME para subdomínio de homologação (ajuste se mudar o domínio)
          echo "homolog.sejaatendido.com.br" > dist/CNAME
          # Fallback SPA para GitHub Pages
          cp dist/index.html dist/404.html

      - name: Deploy para repo de homologação
        uses: peaceiris/actions-gh-pages@v4
        with:
          # PAT com escopo 'repo' adicionado como secret HOMOLOG_DEPLOY_TOKEN
          # no repositório sejaatendido-pwa (Settings → Secrets → Actions)
          personal_token: ${{ secrets.HOMOLOG_DEPLOY_TOKEN }}
          external_repository: rafaelroriz-age/sejaatendido-pwa-homolog
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
